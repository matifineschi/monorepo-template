services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5430:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
  drizzle-gateway:
    image: ghcr.io/drizzle-team/gateway:latest
    container_name: db-inspector
    ports:
      - "3002:3002"
    environment:
      PORT: "3002"
      STORE_PATH: /app
      MASTERPASS: test
    volumes:
      - drizzle-gateway:/app
    restart: unless-stopped

volumes:
  postgres_data:
  drizzle-gateway:
